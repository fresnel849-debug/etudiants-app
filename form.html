<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ajouter un étudiant</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Ajouter un étudiant</h1>

  <div id="alert-zone"></div>

  <form id="mainForm">

    <div class="form-group">
      <label for="nom">Nom</label>
      <input type="text" id="nom" name="nom" class="form-input" placeholder="Ex: Ahounou" />
      <span class="field-error" id="err-nom"></span>
    </div>

    <div class="form-group">
      <label for="prenom">Prénom</label>
      <input type="text" id="prenom" name="prenom" class="form-input" placeholder="Ex: Bruno" />
      <span class="field-error" id="err-prenom"></span>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" class="form-input" placeholder="Ex: bruno@gmail.com" />
      <span class="field-error" id="err-email"></span>
    </div>

    <div class="form-group">
      <label for="telephone">Téléphone</label>
      <input type="tel" id="telephone" name="telephone" class="form-input" placeholder="Ex: +229 97001122" />
      <span class="field-error" id="err-telephone"></span>
    </div>

    <div class="form-group">
      <label for="filiere">Filière</label>
      <input type="text" id="filiere" name="filiere" class="form-input" placeholder="Ex: Informatique" />
      <span class="field-error" id="err-filiere"></span>
    </div>

    <div class="form-actions">
      <button type="submit">Enregistrer</button>
      <a href="index.html">Retour à la liste</a>
    </div>

  </form>

  <script src="script.js"></script>
</body>
</html>
